name: CI / Release

# Every push to main runs lint+test, then detects whether a new release is
# needed.  If the version in pyproject.toml does not yet have a matching git
# tag, the build matrix fires on Windows, Linux, and macOS, bundles all
# runtime dependencies (R, Quarto, TinyTeX, R packages) into the artifact,
# and creates a GitHub Release automatically.  PRs only run lint+test.
#
# Dependency strategy (M63+): all deps are pre-installed in CI and shipped
# inside the release artifact.  No network access or post-install scripts
# are required on the end-user machine.
#
#   Windows : R installed to vendor\r, packages to vendor\r-library,
#             Quarto to vendor\quarto, TinyTeX to vendor\tinytex.
#   Linux   : Packages to vendor/r-library, Quarto to vendor/quarto,
#             TinyTeX to vendor/tinytex.  R itself is a .deb dependency.
#   macOS   : Same as Windows (R bundled from official .pkg).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

# Pinned component versions — bump here to upgrade across all platforms.
env:
  R_VERSION: "4.5.1"
  QUARTO_VERSION: "1.6.39"
  R_PKGS: "'readr','dplyr','stringr','tidyr','ggplot2','knitr','fmsb','scales','viridis','patchwork','RColorBrewer','gridExtra','png','lubridate','kableExtra','rmarkdown','jsonlite','ggrepel','cowplot'"

jobs:
  # ── Lint + Test ──────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3-tk tk-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff pyyaml

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Test
        run: pytest --maxfail=1 --disable-warnings -q

  # ── Detect whether a new release is needed ───────────────────────────────────
  version-check:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
      version: ${{ steps.check.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full tag history

      - name: Check if version tag already exists
        id: check
        run: |
          VERSION=$(python - <<'EOF'
          import re
          m = re.search(r'^version\s*=\s*["\']([^"\']+)', open('pyproject.toml').read(), re.M)
          print(m.group(1) if m else '')
          EOF
          )

          if [ -z "$VERSION" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git tag --list | grep -qx "v${VERSION}"; then
            echo "Tag v${VERSION} already exists — skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version v${VERSION} detected — will release."
            echo "release=true"    >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

  # ── Build artifacts: Windows, Linux, and macOS ───────────────────────────────
  build:
    needs: version-check
    if: needs.version-check.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: ubuntu-latest
            artifact: linux
          - os: macos-14
            artifact: macos
    runs-on: ${{ matrix.os }}
    env:
      APP_VERSION: ${{ needs.version-check.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set repo name
        shell: bash
        run: echo "REPO_NAME=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3-tk tk-dev

      - name: Install macOS system libraries
        if: runner.os == 'macOS'
        run: |
          brew install tcl-tk
          brew install python-tk@3.13 || true

      # ── Bundle: R (Windows) ──────────────────────────────────────────────────
      - name: Cache Windows R + packages + Quarto + TinyTeX
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        id: cache-win
        with:
          path: vendor
          key: bundle-windows-r${{ env.R_VERSION }}-quarto${{ env.QUARTO_VERSION }}

      - name: Install R to vendor\r (Windows)
        if: runner.os == 'Windows' && steps.cache-win.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $url = "https://cran.r-project.org/bin/windows/base/R-$env:R_VERSION-win.exe"
          Write-Host "Downloading R $env:R_VERSION from $url ..."
          Invoke-WebRequest $url -OutFile "R-installer.exe"
          Write-Host "Installing R to vendor\r ..."
          Start-Process "R-installer.exe" `
            -ArgumentList "/VERYSILENT /NORESTART /DIR=`"$PWD\vendor\r`"" `
            -Wait -PassThru | Out-Null
          Write-Host "R version: $(& 'vendor\r\bin\Rscript.exe' --version 2>&1)"

      - name: Install R packages to vendor\r-library (Windows)
        if: runner.os == 'Windows' && steps.cache-win.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force "vendor\r-library" | Out-Null
          & "vendor\r\bin\Rscript.exe" -e `
            "install.packages(c($env:R_PKGS), lib='vendor/r-library', repos='https://cloud.r-project.org', Ncpus=2)"

      - name: Download Quarto to vendor\quarto (Windows)
        if: runner.os == 'Windows' && steps.cache-win.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $url = "https://github.com/quarto-dev/quarto-cli/releases/download/v$env:QUARTO_VERSION/quarto-$env:QUARTO_VERSION-win.zip"
          Write-Host "Downloading Quarto $env:QUARTO_VERSION ..."
          Invoke-WebRequest $url -OutFile "quarto.zip"
          Expand-Archive "quarto.zip" -DestinationPath "vendor_tmp"
          $extracted = Get-ChildItem "vendor_tmp" | Select-Object -First 1
          Move-Item $extracted.FullName "vendor\quarto"
          Remove-Item "vendor_tmp" -Recurse -Force
          Write-Host "Quarto version: $(& 'vendor\quarto\bin\quarto.exe' --version)"

      - name: Install TinyTeX via Quarto, copy to vendor\tinytex (Windows)
        if: runner.os == 'Windows' && steps.cache-win.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          & "vendor\quarto\bin\quarto.exe" install tinytex --no-prompt
          $candidates = @(
            "$env:APPDATA\quarto\tools\tinytex",
            "$env:LOCALAPPDATA\quarto\tools\tinytex"
          )
          $src = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $src) {
            Write-Error "TinyTeX not found after quarto install tinytex"
            exit 1
          }
          Write-Host "Copying TinyTeX from $src to vendor\tinytex ..."
          Copy-Item -Recurse $src "vendor\tinytex"
          Write-Host "TinyTeX bundled OK."

      # ── Bundle: R packages + Quarto + TinyTeX (Linux) ───────────────────────
      - name: Install R and system libs for package compilation (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            r-base r-base-dev \
            libharfbuzz-dev libfribidi-dev \
            libxml2-dev libcurl4-openssl-dev \
            libssl-dev libfontconfig1-dev

      - name: Cache Linux R packages + Quarto + TinyTeX
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        id: cache-linux
        with:
          path: vendor
          key: bundle-linux-r${{ env.R_VERSION }}-quarto${{ env.QUARTO_VERSION }}

      - name: Install R packages to vendor/r-library (Linux)
        if: runner.os == 'Linux' && steps.cache-linux.outputs.cache-hit != 'true'
        run: |
          mkdir -p vendor/r-library
          sudo Rscript -e \
            "install.packages(c($R_PKGS), lib='vendor/r-library', repos='https://cloud.r-project.org', Ncpus=2)"
          sudo chmod -R a+rX vendor/r-library

      - name: Download Quarto to vendor/quarto (Linux)
        if: runner.os == 'Linux' && steps.cache-linux.outputs.cache-hit != 'true'
        run: |
          URL="https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-linux-amd64.tar.gz"
          echo "Downloading Quarto ${QUARTO_VERSION} ..."
          wget -q "$URL" -O quarto.tar.gz
          mkdir -p vendor
          tar xzf quarto.tar.gz -C vendor
          mv "vendor/quarto-${QUARTO_VERSION}" vendor/quarto
          echo "Quarto version: $(vendor/quarto/bin/quarto --version)"

      - name: Install TinyTeX via Quarto, copy to vendor/tinytex (Linux)
        if: runner.os == 'Linux' && steps.cache-linux.outputs.cache-hit != 'true'
        run: |
          vendor/quarto/bin/quarto install tinytex --no-prompt
          ARCH=$(uname -m)
          SRC="$HOME/.local/share/quarto/tools/tinytex"
          if [ ! -d "$SRC" ]; then
            echo "::error::TinyTeX not found at $SRC after quarto install"
            exit 1
          fi
          cp -r "$SRC" vendor/tinytex
          echo "TinyTeX bundled from $SRC"

      # ── Bundle: R + packages + Quarto + TinyTeX (macOS) ─────────────────────
      - name: Cache macOS R + packages + Quarto + TinyTeX
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        id: cache-macos
        with:
          path: vendor
          key: bundle-macos-r${{ env.R_VERSION }}-quarto${{ env.QUARTO_VERSION }}

      - name: Install R from official pkg (macOS)
        if: runner.os == 'macOS' && steps.cache-macos.outputs.cache-hit != 'true'
        run: |
          URL="https://cran.r-project.org/bin/macosx/big-sur-arm64/base/R-${R_VERSION}-arm64.pkg"
          echo "Downloading R ${R_VERSION} for macOS arm64 ..."
          curl -L "$URL" -o R.pkg
          sudo installer -pkg R.pkg -target /
          echo "R version: $(Rscript --version 2>&1)"
          # Bundle the R framework resources into vendor/r
          R_FRAMEWORK="/Library/Frameworks/R.framework/Resources"
          mkdir -p vendor/r
          cp -R "$R_FRAMEWORK/." vendor/r/
          echo "R bundled from $R_FRAMEWORK"

      - name: Install R packages to vendor/r-library (macOS)
        if: runner.os == 'macOS' && steps.cache-macos.outputs.cache-hit != 'true'
        run: |
          mkdir -p vendor/r-library
          Rscript -e \
            "install.packages(c($R_PKGS), lib='vendor/r-library', repos='https://cloud.r-project.org', Ncpus=2)"

      - name: Download Quarto to vendor/quarto (macOS)
        if: runner.os == 'macOS' && steps.cache-macos.outputs.cache-hit != 'true'
        run: |
          URL="https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-macos.tar.gz"
          echo "Downloading Quarto ${QUARTO_VERSION} for macOS ..."
          curl -L "$URL" -o quarto.tar.gz
          mkdir -p vendor
          tar xzf quarto.tar.gz -C vendor
          mv "vendor/quarto-${QUARTO_VERSION}" vendor/quarto 2>/dev/null || \
            mv vendor/quarto-* vendor/quarto 2>/dev/null || true
          echo "Quarto version: $(vendor/quarto/bin/quarto --version)"

      - name: Install TinyTeX via Quarto, copy to vendor/tinytex (macOS)
        if: runner.os == 'macOS' && steps.cache-macos.outputs.cache-hit != 'true'
        run: |
          vendor/quarto/bin/quarto install tinytex --no-prompt
          SRC="$HOME/Library/Application Support/quarto/tools/tinytex"
          if [ ! -d "$SRC" ]; then
            # Try alternate location used by some Quarto versions
            SRC="$HOME/.local/share/quarto/tools/tinytex"
          fi
          if [ ! -d "$SRC" ]; then
            echo "::error::TinyTeX not found after quarto install"
            exit 1
          fi
          cp -R "$SRC" vendor/tinytex
          echo "TinyTeX bundled from $SRC"

      # ── Write version file ───────────────────────────────────────────────────
      - name: Write _version.py
        shell: python
        run: |
          import os
          ver = os.environ["APP_VERSION"]
          with open("app/_version.py", "w") as f:
              f.write(f'__version__ = "{ver}"\n')
          print(f"Wrote app/_version.py: {ver}")

      # ── Windows build ────────────────────────────────────────────────────────
      - name: Generate Windows version resource
        if: runner.os == 'Windows'
        shell: python
        run: |
          import os, textwrap
          v = os.environ["APP_VERSION"].split(".")
          major = int(v[0]); minor = int(v[1] if len(v)>1 else 0); patch = int(v[2] if len(v)>2 else 0)
          repo = os.environ["REPO_NAME"]; ver = os.environ["APP_VERSION"]
          txt = textwrap.dedent(f"""
            VSVersionInfo(
              ffi=FixedFileInfo(
                filevers=({major},{minor},{patch},0), prodvers=({major},{minor},{patch},0),
                mask=0x3f, flags=0x0, OS=0x40004, fileType=0x1, subtype=0x0, date=(0,0)),
              kids=[
                StringFileInfo([StringTable(u'040904B0',[
                  StringStruct(u'CompanyName',      u''),
                  StringStruct(u'FileDescription',  u'{repo}'),
                  StringStruct(u'FileVersion',      u'{ver}'),
                  StringStruct(u'InternalName',     u'{repo}'),
                  StringStruct(u'OriginalFilename', u'{repo}.exe'),
                  StringStruct(u'ProductName',      u'{repo}'),
                  StringStruct(u'ProductVersion',   u'{ver}'),
                ])]),
                VarFileInfo([VarStruct(u'Translation',[1033,1200])])
              ])
          """).strip()
          os.makedirs("packaging", exist_ok=True)
          open("packaging/windows-version.txt","w").write(txt)

      - name: Build Windows app (onedir)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $icon = if (Test-Path "assets/icon.ico") { @("--icon","assets/icon.ico") } else { @() }
          pyinstaller --clean --noconfirm --onedir --windowed `
            @icon `
            --version-file packaging/windows-version.txt `
            --name "$env:REPO_NAME" `
            --hidden-import tkinter `
            --hidden-import _tkinter `
            --add-data "ResilienceReport.qmd;." `
            --add-data "SCROLReport.qmd;." `
            --add-data "img;img" `
            --add-data "tex;tex" `
            --add-data "_extensions;_extensions" `
            --add-data "references.bib;." `
            --add-data "QTDublinIrish.otf;." `
            --add-data "vendor\r;r" `
            --add-data "vendor\r-library;r-library" `
            --add-data "vendor\quarto;quarto" `
            --add-data "vendor\tinytex;tinytex" `
            app/main.py

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          # Search pre-installed locations first
          $candidates = @(
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe"
          )
          $found = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $found) {
            $cmd = Get-Command makensis -ErrorAction SilentlyContinue
            $found = if ($cmd) { $cmd.Source } else { $null }
          }
          if (-not $found) {
            Write-Host "NSIS not pre-installed, trying winget..."
            winget install NSIS.NSIS --silent `
              --accept-source-agreements --accept-package-agreements
            Write-Host "winget done (rc=$LASTEXITCODE)"   # reset last-exit
            $found = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $found) {
            Write-Host "::error::makensis.exe not found in any expected location"
            exit 1
          }
          Write-Host "NSIS: $found"
          echo "MAKENSIS=$found" >> $env:GITHUB_ENV

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: python
        run: |
          import os, subprocess, shutil, textwrap
          repo = os.environ["REPO_NAME"]
          ver  = os.environ["APP_VERSION"]
          ws     = os.environ.get("GITHUB_WORKSPACE", os.getcwd())
          dist   = os.path.join(ws, "dist")
          bundle = os.path.join(dist, repo)
          nsi = textwrap.dedent(f"""
            Unicode true
            Name "{repo} {ver}"
            OutFile "{dist}\\{repo}-{ver}-windows-setup.exe"
            InstallDir "$PROGRAMFILES64\\{repo}"
            RequestExecutionLevel admin
            Page directory
            Page instfiles
            Section
              SetOutPath "$INSTDIR"
              File /r "{bundle}\\"
              CreateShortcut "$DESKTOP\\{repo}.lnk" "$INSTDIR\\{repo}.exe"
              WriteUninstaller "$INSTDIR\\Uninstall.exe"
            SectionEnd
            Section "Uninstall"
              Delete "$DESKTOP\\{repo}.lnk"
              Delete "$INSTDIR\\Uninstall.exe"
              RMDir /r "$INSTDIR"
            SectionEnd
          """).lstrip()
          os.makedirs("packaging", exist_ok=True)
          with open("packaging\\installer.nsi", "w", encoding="utf-8") as f:
              f.write(nsi)
          makensis = os.environ.get("MAKENSIS") \
                  or shutil.which("makensis") \
                  or r"C:\Program Files (x86)\NSIS\makensis.exe"
          subprocess.run([makensis, "packaging\\installer.nsi"], check=True)

      - name: Package Windows portable zip
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Compress-Archive -Path "dist\$env:REPO_NAME\*" `
            -DestinationPath "dist\$env:REPO_NAME-$env:APP_VERSION-windows-portable.zip"

      # ── Linux build ────────────────────────────────────────────────────────────
      - name: Build Linux app (onedir)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --clean --noconfirm --onedir \
            --name "$REPO_NAME" \
            --hidden-import tkinter \
            --hidden-import _tkinter \
            --add-data "ResilienceReport.qmd:." \
            --add-data "SCROLReport.qmd:." \
            --add-data "img:img" \
            --add-data "tex:tex" \
            --add-data "_extensions:_extensions" \
            --add-data "references.bib:." \
            --add-data "QTDublinIrish.otf:." \
            --add-data "vendor/r-library:r-library" \
            --add-data "vendor/quarto:quarto" \
            --add-data "vendor/tinytex:tinytex" \
            app/main.py

      - name: Generate .desktop file
        if: runner.os == 'Linux'
        run: |
          APP_NAME=$(echo "$REPO_NAME" | sed 's/-/ /g; s/\b./\u&/g')
          export APP_NAME
          envsubst < packaging/template.desktop > "packaging/${REPO_NAME}.desktop"

      - name: Package Linux tarball
        if: runner.os == 'Linux'
        run: |
          tar -czf "dist/${REPO_NAME}-${APP_VERSION}-linux-amd64.tar.gz" \
            -C dist "${REPO_NAME}"

      - name: Package AppImage
        if: runner.os == 'Linux'
        run: |
          mkdir -p AppDir/usr/bin
          cp -r "dist/$REPO_NAME/"* AppDir/usr/bin/
          cp "packaging/${REPO_NAME}.desktop" AppDir/
          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png "AppDir/${REPO_NAME}.png"
          else
            python -c "
          import struct, zlib
          def chunk(t,d):
            c=struct.pack('>I',len(d))+t+d
            return c+struct.pack('>I',zlib.crc32(c[4:])&0xffffffff)
          sig=b'\x89PNG\r\n\x1a\n'
          open('AppDir/${REPO_NAME}.png','wb').write(
            sig+chunk(b'IHDR',struct.pack('>IIBBBBB',1,1,8,2,0,0,0))
               +chunk(b'IDAT',zlib.compress(b'\x00\xff\x00\x00'))
               +chunk(b'IEND',b''))"
          fi
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run \
            AppDir "dist/${REPO_NAME}-${APP_VERSION}-x86_64.AppImage"

      - name: Build .deb package
        if: runner.os == 'Linux'
        run: |
          PKG_NAME=$(echo "${REPO_NAME}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          DEB_ROOT="$(pwd)/deb_build"
          mkdir -p "${DEB_ROOT}/DEBIAN"
          mkdir -p "${DEB_ROOT}/opt/${REPO_NAME}"
          mkdir -p "${DEB_ROOT}/usr/bin"
          mkdir -p "${DEB_ROOT}/usr/share/applications"
          cp -r "dist/${REPO_NAME}/." "${DEB_ROOT}/opt/${REPO_NAME}/"
          ln -s "/opt/${REPO_NAME}/${REPO_NAME}" "${DEB_ROOT}/usr/bin/${REPO_NAME}"
          cp "packaging/${REPO_NAME}.desktop" "${DEB_ROOT}/usr/share/applications/"
          # R is a .deb dependency — packages, Quarto, and TinyTeX are bundled.
          printf 'Package: %s\nVersion: %s\nArchitecture: amd64\nMaintainer: Windesheim <info@windesheim.nl>\nDepends: r-base (>= 4.4)\nDescription: ResilienceScan Control Center\n' \
            "$PKG_NAME" "$APP_VERSION" > "${DEB_ROOT}/DEBIAN/control"
          dpkg-deb --build --root-owner-group "${DEB_ROOT}" \
            "dist/${REPO_NAME}-${APP_VERSION}-amd64.deb"

      # ── macOS build ────────────────────────────────────────────────────────────
      - name: Build macOS app (.app bundle)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --clean --noconfirm --onedir --windowed \
            --name "$REPO_NAME" \
            --hidden-import tkinter \
            --hidden-import _tkinter \
            --add-data "ResilienceReport.qmd:." \
            --add-data "SCROLReport.qmd:." \
            --add-data "img:img" \
            --add-data "tex:tex" \
            --add-data "_extensions:_extensions" \
            --add-data "references.bib:." \
            --add-data "QTDublinIrish.otf:." \
            --add-data "vendor/r:r" \
            --add-data "vendor/r-library:r-library" \
            --add-data "vendor/quarto:quarto" \
            --add-data "vendor/tinytex:tinytex" \
            app/main.py

      - name: Package macOS DMG
        if: runner.os == 'macOS'
        run: |
          APP_BUNDLE="dist/${REPO_NAME}.app"
          if [ ! -d "$APP_BUNDLE" ]; then
            APP_BUNDLE="dist/${REPO_NAME}"
          fi
          hdiutil create \
            -volname "${REPO_NAME} ${APP_VERSION}" \
            -srcfolder "$APP_BUNDLE" \
            -ov -format UDZO \
            "dist/${REPO_NAME}-${APP_VERSION}-macos-arm64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: dist/*

  # ── Windows installer smoke test: verify bundled dirs ────────────────────────
  installer-smoke:
    needs: [version-check, build]
    if: needs.version-check.outputs.release == 'true'
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.version-check.outputs.version }}
      REPO_NAME: ResilenceScanReportBuilder

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: dist

      - name: Run installer silently
        shell: powershell
        run: |
          $exe = Get-ChildItem dist -Filter "*-windows-setup.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "Installer .exe not found in dist/"; exit 1 }
          Write-Host "Executing: $($exe.FullName) /S"
          $proc = Start-Process $exe.FullName -ArgumentList "/S" -Wait -PassThru
          Write-Host "Exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) {
            Write-Error "Installer exited $($proc.ExitCode)"
            exit $proc.ExitCode
          }

      - name: Check installed files and bundled dependencies
        shell: powershell
        run: |
          $inst = "$env:PROGRAMFILES\$env:REPO_NAME"
          $int  = "$inst\_internal"
          $fail = 0

          function ck($p) {
            if (Test-Path $p) { Write-Host "  OK  $p" }
            else { Write-Host "MISSING  $p"; $script:fail++ }
          }

          Write-Host "=== Core files ==="
          ck "$inst\$env:REPO_NAME.exe"
          ck "$inst\Uninstall.exe"
          ck "$int\ResilienceReport.qmd"
          ck "$int\SCROLReport.qmd"
          ck "$int\references.bib"
          ck "$int\QTDublinIrish.otf"
          ck "$int\img"
          ck "$int\tex"
          ck "$int\_extensions"

          Write-Host "=== Bundled dependencies ==="
          ck "$int\r"
          ck "$int\r\bin\Rscript.exe"
          ck "$int\r-library"
          ck "$int\quarto"
          ck "$int\quarto\bin\quarto.exe"
          ck "$int\tinytex"

          if ($fail -gt 0) {
            Write-Error "$fail file(s) missing after installation"
            exit 1
          }
          Write-Host "All expected files present — bundled install OK."

  # ── macOS build smoke test: mount DMG, verify .app bundle structure ──────────
  build-smoke-macos:
    needs: [version-check, build]
    if: needs.version-check.outputs.release == 'true'
    runs-on: macos-14
    env:
      APP_VERSION: ${{ needs.version-check.outputs.version }}
      REPO_NAME: ResilenceScanReportBuilder

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: dist

      - name: Verify DMG exists and size
        run: |
          DMG=$(ls dist/*-macos-arm64.dmg 2>/dev/null | head -1)
          [ -n "$DMG" ] || { echo "::error::No macOS DMG found in dist/"; ls dist/ || true; exit 1; }
          SIZE=$(stat -f%z "$DMG")
          echo "DMG: $(basename "$DMG")  size=${SIZE} bytes"
          [ "$SIZE" -gt 10000000 ] \
            || { echo "::error::DMG suspiciously small (${SIZE} bytes — expected >10 MB with bundled deps)"; exit 1; }
          echo "DMG size OK."

      - name: Mount DMG and verify app bundle
        run: |
          set -euo pipefail
          DMG=$(ls dist/*-macos-arm64.dmg | head -1)
          MOUNT_DIR=$(mktemp -d /tmp/dmg-smoke-XXXX)
          hdiutil attach "$DMG" -nobrowse -readonly -mountpoint "$MOUNT_DIR"
          trap "hdiutil detach '$MOUNT_DIR' 2>/dev/null || true; rm -rf '$MOUNT_DIR'" EXIT

          APP=$(find "$MOUNT_DIR" -name "*.app" -maxdepth 2 2>/dev/null | head -1)
          [ -n "$APP" ] || { echo "::error::No .app bundle found in DMG"; exit 1; }
          echo "App bundle: $APP"

          INTERNAL="$APP/Contents/MacOS/_internal"
          BINARY="$APP/Contents/MacOS/$REPO_NAME"
          fail=0

          chk() {
            if [ -e "$1" ]; then printf '  OK  %s\n' "$1"
            else printf 'MISSING  %s\n' "$1"; fail=$((fail+1)); fi
          }

          echo "=== Core files ==="
          chk "$BINARY"
          chk "$APP/Contents/Info.plist"
          chk "$INTERNAL/ResilienceReport.qmd"
          chk "$INTERNAL/SCROLReport.qmd"
          chk "$INTERNAL/references.bib"
          chk "$INTERNAL/QTDublinIrish.otf"
          chk "$INTERNAL/img"
          chk "$INTERNAL/tex"
          chk "$INTERNAL/_extensions"

          echo "=== Bundled dependencies ==="
          chk "$INTERNAL/r"
          chk "$INTERNAL/r/bin/Rscript"
          chk "$INTERNAL/r-library"
          chk "$INTERNAL/quarto"
          chk "$INTERNAL/quarto/bin/quarto"
          chk "$INTERNAL/tinytex"

          [ -x "$BINARY" ] && printf '  OK  binary is executable\n' \
            || { printf 'FAIL  binary is not executable\n'; fail=$((fail+1)); }

          echo "==="
          [ "$fail" -eq 0 ] || { echo "::error::$fail check(s) failed"; exit 1; }
          echo "macOS build smoke PASSED."

      - name: Upload DMG info (always)
        if: always()
        run: |
          DMG=$(ls dist/*-macos-arm64.dmg 2>/dev/null | head -1) || true
          [ -n "$DMG" ] \
            && echo "Artifact: $(basename "$DMG") — $(du -h "$DMG" | cut -f1)" \
            || echo "No DMG artifact found."

  # ── Create the GitHub Release and attach all artifacts ───────────────────────
  publish:
    needs: [version-check, build, installer-smoke, build-smoke-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          name: v${{ needs.version-check.outputs.version }}
          generate_release_notes: true
          files: release-assets/*

  # ── Patch README download links after release ─────────────────────────────────
  update-readme:
    needs: [version-check, publish]
    runs-on: ubuntu-latest
    env:
      VER: ${{ needs.version-check.outputs.version }}
      REPO: Windesheim-A-I-Support/ResilenceScanReportBuilder

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch download links in README
        run: |
          BASE="https://github.com/${REPO}/releases/download/v${VER}"
          REPO_NAME="${REPO#*/}"
          sed -i \
            -e "s|releases/download/v[0-9.]\+/${REPO_NAME}-[0-9.]\+-windows-setup\.exe|releases/download/v${VER}/${REPO_NAME}-${VER}-windows-setup.exe|g" \
            -e "s|releases/download/v[0-9.]\+/${REPO_NAME}-[0-9.]\+-linux-amd64\.tar\.gz|releases/download/v${VER}/${REPO_NAME}-${VER}-linux-amd64.tar.gz|g" \
            -e "s|releases/download/v[0-9.]\+/${REPO_NAME}-[0-9.]\+-macos-arm64\.dmg|releases/download/v${VER}/${REPO_NAME}-${VER}-macos-arm64.dmg|g" \
            README.md
          if git diff --quiet; then
            echo "No README changes needed."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: update download links for v${VER} [skip ci]"
            git push
          fi
